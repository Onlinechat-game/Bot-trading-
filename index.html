<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HackenStore NATIVE</title>
    <style>
        body {
            background-color: #05070a;
            color: #e0e6ed;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 10px;
            font-size: 12px;
        }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .logo { color: #00f2ff; font-weight: bold; font-size: 16px; text-shadow: 0 0 5px #00f2ff; }
        
        .box { background: #0f141f; border: 1px solid #334155; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .signal { font-size: 24px; font-weight: bold; margin: 10px 0; }
        .buy { color: #00ff9d; }
        .sell { color: #ff0055; }
        .wait { color: #ffaa00; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .card { background: #0f141f; border: 1px solid #334155; padding: 10px; border-radius: 6px; text-align: center; }
        .card h4 { margin: 0 0 5px 0; color: #64748b; font-size: 10px; text-transform: uppercase; }
        .val { font-size: 16px; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; background: #0f141f; border-radius: 6px; overflow: hidden; margin-bottom: 15px; font-size: 10px; }
        th { text-align: left; color: #64748b; padding: 8px; border-bottom: 1px solid #334155; }
        td { padding: 8px; border-bottom: 1px solid #334155; font-family: monospace; }

        /* ZONE GRAPHIQUE MANUELLE */
        .chart-box {
            background: #0f141f;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
            position: relative;
        }
        canvas {
            width: 100%;
            height: 200px;
            display: block;
        }

        .log { background: #000; border: 1px solid #333; height: 80px; overflow-y: scroll; color: #0f0; font-size: 9px; padding: 5px; font-family: monospace; }
        .footer { text-align: center; color: #64748b; font-size: 10px; margin-top: 20px; }
        .sig { color: #00f2ff; font-weight: bold; font-size: 14px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">HACKENSTORE NATIVE</div>
        <div style="color:#fff; font-size:10px;">1.0s LIVE</div>
    </div>

    <div class="box">
        <div style="color:#64748b; font-size:10px; text-transform:uppercase;">Prédiction H+1</div>
        <div id="signal" class="signal wait">CALCUL...</div>
        <div id="reason" style="font-size:11px; color:#8899a6;">Analyse en cours...</div>
    </div>

    <div class="grid">
        <div class="card">
            <h4>PRIX OR</h4>
            <div id="price" class="val">---</div>
        </div>
        <div class="card">
            <h4>RSI</h4>
            <div id="rsi" class="val">---</div>
        </div>
        <div class="card">
            <h4>TENDANCE</h4>
            <div id="trend" class="val">---</div>
        </div>
        <div class="card">
            <h4>PROBA</h4>
            <div id="prob" class="val">---</div>
        </div>
    </div>

    <table>
        <thead><tr><th>INDICATEUR</th><th>VALEUR</th><th>SIGNAL</th></tr></thead>
        <tbody>
            <tr><td>MM 20</td><td id="t-mm">---</td><td id="s-mm">---</td></tr>
            <tr><td>Bollinger</td><td id="t-bb">---</td><td id="s-bb">---</td></tr>
            <tr><td>Volume</td><td id="t-vol">---</td><td id="s-vol">---</td></tr>
        </tbody>
    </table>

    <!-- GRAPHIQUE DESSINÉ À LA MAIN -->
    <div class="chart-box">
        <canvas id="myCanvas" width="350" height="200"></canvas>
    </div>

    <div class="log" id="log">
        > Système Native Initialisé...<br>
        > Moteur graphique prêt.<br>
    </div>

    <div class="footer">
        CODE 100% LOCAL - SANS INTERNET<br>
        <span class="sig">HACKENSTORE</span>
    </div>

    <script>
        // --- CONFIGURATION ---
        let price = 2035.00;
        let data = [];
        const maxPoints = 40;
        
        // Remplir données initiales
        for(let i=0; i<maxPoints; i++) {
            data.push(price + (Math.random() * 2 - 1));
        }

        function getRSI(data) {
            if(data.length < 15) return 50;
            let gain = 0, loss = 0;
            for(let i = data.length-14; i < data.length; i++) {
                let diff = data[i] - data[i-1];
                if(diff >= 0) gain += diff; else loss -= diff;
            }
            if(loss === 0) return 100;
            return 100 - (100 / (1 + (gain/loss)));
        }

        function getSMA(data, period) {
            if(data.length < period) return data[data.length-1];
            let sum = 0;
            for(let i = data.length-period; i < data.length; i++) sum += data[i];
            return sum / period;
        }

        function drawGraph() {
            const canvas = document.getElementById('myCanvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;

            // Effacer
            ctx.clearRect(0, 0, w, h);

            // Trouver min/max pour l'échelle
            let min = Math.min(...data) - 1;
            let max = Math.max(...data) + 1;
            let range = max - min;

            // Dessiner la ligne
            ctx.beginPath();
            ctx.strokeStyle = '#00f2ff';
            ctx.lineWidth = 2;
            
            let stepX = w / (maxPoints - 1);

            for(let i = 0; i < data.length; i++) {
                let x = i * stepX;
                // Inverser Y car 0 est en haut sur canvas
                let y = h - ((data[i] - min) / range) * h;
                
                if(i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Dessiner la zone remplie en dessous
            ctx.lineTo(w, h);
            ctx.lineTo(0, h);
            ctx.fillStyle = 'rgba(0, 242, 255, 0.1)';
            ctx.fill();

            // Dessiner le point actuel clignotant
            let lastX = (data.length - 1) * stepX;
            let lastY = h - ((data[data.length-1] - min) / range) * h;
            
            ctx.beginPath();
            ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        }

        function update() {
            // Simulation mouvement prix
            let change = (Math.random() * 0.8) - 0.4;
            // Ajout tendance aléatoire
            if(Math.random() > 0.95) window.trendBias = (Math.random() * 2) - 1;
            change += (window.trendBias || 0) * 0.2;
            
            price += change;
            data.push(price);
            if(data.length > maxPoints) data.shift();

            // Calculs
            let rsi = getRSI(data);
            let mm20 = getSMA(data, 20);
            
            // Affichage Textes
            document.getElementById('price').innerText = price.toFixed(2);
            document.getElementById('price').style.color = change >= 0 ? '#00ff9d' : '#ff0055';
            
            document.getElementById('rsi').innerText = rsi.toFixed(1);
            document.getElementById('rsi').style.color = rsi > 70 ? '#ff0055' : (rsi < 30 ? '#00ff9d' : '#fff');

            document.getElementById('t-mm').innerText = mm20.toFixed(2);
            let sigMM = price > mm20 ? "ACHAT" : "VENTE";
            document.getElementById('s-mm').innerText = sigMM;
            document.getElementById('s-mm').style.color = price > mm20 ? "#00ff9d" : "#ff0055";

            document.getElementById('t-bb').innerText = "NORMAL";
            document.getElementById('s-bb').innerText = "OK";
            
            document.getElementById('t-vol').innerText = Math.random() > 0.5 ? "HAUT" : "BAS";
            document.getElementById('s-vol').innerText = "ACTIF";

            // Logique Signal
            let signalEl = document.getElementById('signal');
            let reasonEl = document.getElementById('reason');
            let trendEl = document.getElementById('trend');
            let probEl = document.getElementById('prob');

            if(rsi > 60 && price > mm20) {
                signalEl.innerText = "ACHAT 🚀";
                signalEl.className = "signal buy";
                trendEl.innerText = "HAUSSIER";
                trendEl.style.color = "#00ff9d";
                probEl.innerText = "85%";
                reasonEl.innerText = "RSI Fort + Prix > MM20";
            } else if (rsi < 40 && price < mm20) {
                signalEl.innerText = "VENTE 📉";
                signalEl.className = "signal sell";
                trendEl.innerText = "BAISSIER";
                trendEl.style.color = "#ff0055";
                probEl.innerText = "85%";
                reasonEl.innerText = "RSI Faible + Prix < MM20";
            } else {
                signalEl.innerText = "ATTENTE ⚠️";
                signalEl.className = "signal wait";
                trendEl.innerText = "NEUTRE";
                trendEl.style.color = "#ffaa00";
                probEl.innerText = "50%";
                reasonEl.innerText = "Marché indécis";
            }

            // Dessiner le graphique
            drawGraph();

            // Log console
            if(Math.random() > 0.8) {
                let logDiv = document.getElementById('log');
                let time = new Date().toLocaleTimeString();
                logDiv.innerHTML = `> [${time}] Update: ${price.toFixed(2)} | RSI: ${rsi.toFixed(1)}<br>` + logDiv.innerHTML;
                if(logDiv.innerHTML.length > 500) logDiv.innerHTML = logDiv.innerHTML.substring(0, 500);
            }
        }

        // Lancement
        window.onload = function() {
            setInterval(update, 1000); // 1 seconde
        };
    </script>
</body>
    </html>
