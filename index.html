<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HackenStore PRO | Stable</title>
    <!-- Chargement de Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: #0f141f;
            --text-main: #e0e6ed;
            --text-dim: #64748b;
            --accent: #00f2ff;
            --bull: #00ff9d;
            --bear: #ff0055;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 10px;
            font-size: 12px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .logo { font-weight: 900; font-size: 18px; color: var(--accent); text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .timer { font-size: 10px; color: #fff; background: #333; padding: 2px 6px; border-radius: 4px; }

        .prediction-box {
            background: linear-gradient(135deg, #1e293b 0%, #0f141f 100%);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }
        .pred-title { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
        .pred-value { font-size: 24px; font-weight: bold; margin: 5px 0; min-height: 30px; }
        .bull-text { color: var(--bull); }
        .bear-text { color: var(--bear); }
        .neutral-text { color: #fff; }

        .grid-pro {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 10px;
            text-align: center;
        }
        .card h4 { margin: 0 0 5px 0; font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
        .card .val { font-size: 16px; font-weight: bold; font-family: monospace; }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
            margin-bottom: 15px;
            background: var(--card-bg);
            border-radius: 6px;
            overflow: hidden;
        }
        .data-table th { text-align: left; color: var(--text-dim); padding: 8px; border-bottom: 1px solid #1e293b; }
        .data-table td { padding: 8px; border-bottom: 1px solid #1e293b; font-family: monospace; }
        
        /* ZONE GRAPHIQUE SIMPLIFIÉE */
        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid #1e293b;
            border-radius: 6px;
            margin-bottom: 15px;
            padding: 10px;
            box-sizing: border-box;
        }

        .console-log {
            background: #000;
            border: 1px solid #333;
            height: 80px;
            overflow-y: scroll;
            font-size: 9px;
            padding: 5px;
            color: #0f0;
            font-family: monospace;
            margin-bottom: 15px;
        }
        .log-entry { margin-bottom: 2px; border-bottom: 1px solid #111; }

        .footer { text-align: center; font-size: 10px; color: var(--text-dim); padding-top: 10px; }
        .hacken-signature { color: var(--accent); font-weight: bold; font-size: 14px; letter-spacing: 2px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">HACKENSTORE PRO</div>
        <div class="timer">UPDATE: 1.0s</div>
    </div>

    <div class="prediction-box">
        <div class="pred-title">Prédiction H+1</div>
        <div id="mainSignal" class="pred-value neutral-text">INITIALISATION...</div>
        <div style="font-size: 11px; color: #8899a6;" id="algoReason">Calcul en cours...</div>
    </div>

    <div class="grid-pro">
        <div class="card">
            <h4>PRIX XAUUSD</h4>
            <div class="val" id="priceDisplay">---</div>
        </div>
        <div class="card">
            <h4>RSI (14)</h4>
            <div class="val" id="rsiDisplay">---</div>
        </div>
        <div class="card">
            <h4>TENDANCE</h4>
            <div class="val" id="trendDisplay">---</div>
        </div>
        <div class="card">
            <h4>PROBABILITÉ</h4>
            <div class="val" id="probDisplay">---</div>
        </div>
    </div>

    <table class="data-table">
        <thead><tr><th>INDICATEUR</th><th>VALEUR</th><th>SIGNAL</th></tr></thead>
        <tbody>
            <tr>
                <td>Moving Avg 20</td>
                <td id="tbl-mm20">---</td>
                <td id="sig-mm20">---</td>
            </tr>
            <tr>
                <td>Bollinger Bands</td>
                <td id="tbl-bb">---</td>
                <td id="sig-bb">---</td>
            </tr>
            <tr>
                <td>Volume</td>
                <td id="tbl-vol">---</td>
                <td id="sig-vol">---</td>
            </tr>
        </tbody>
    </table>

    <!-- GRAPHIQUE -->
    <div class="chart-container">
        <canvas id="proChart"></canvas>
    </div>

    <div class="console-log" id="consoleLog">
        <div class="log-entry">> Système prêt.</div>
    </div>

    <div class="footer">
        ALGORITHME DE PRÉDICTION TEMPS RÉEL<br>
        <span class="hacken-signature">HACKENSTORE</span>
    </div>

    <script>
        // --- CONFIGURATION STABLE ---
        const UPDATE_INTERVAL = 1000; // 1 SECONDE (Stable pour tous les téléphones)
        let lastPrice = 2035.50;
        let trendBias = 0; 
        let volatility = 0.5;
        
        let priceHistory = [];
        const MAX_POINTS = 30; // Réduit pour performance mobile

        // Initialisation données
        for(let i=0; i<MAX_POINTS; i++) {
            priceHistory.push(lastPrice + (Math.random() * 2 - 1));
        }

        let chartInstance = null;

        function simulateMarketTick() {
            if(Math.random() > 0.9) trendBias = (Math.random() * 2 - 1) * 0.5;
            let change = (Math.random() * volatility * 2 - volatility) + (trendBias * 0.1);
            lastPrice += change;
            return lastPrice;
        }

        function calculateRSI(data, period = 14) {
            if (data.length < period + 1) return 50;
            let gains = 0, losses = 0;
            for (let i = data.length - period; i < data.length; i++) {
                let diff = data[i] - data[i-1];
                if (diff >= 0) gains += diff;
                else losses -= diff;
            }
            let rs = gains / (losses === 0 ? 1 : losses);
            return 100 - (100 / (1 + rs));
        }

        function calculateSMA(data, period) {
            if (data.length < period) return data[data.length-1];
            let sum = 0;
            for(let i = data.length - period; i < data.length; i++) sum += data[i];
            return sum / period;
        }

        function runAnalysis() {
            const currentPrice = simulateMarketTick();
            priceHistory.push(currentPrice);
            if(priceHistory.length > MAX_POINTS) priceHistory.shift();

            const rsi = calculateRSI(priceHistory);
            const mm20 = calculateSMA(priceHistory, 20);
            
            // Mise à jour Affichage
            document.getElementById('priceDisplay').innerText = currentPrice.toFixed(2);
            document.getElementById('priceDisplay').style.color = currentPrice > priceHistory[priceHistory.length-2] ? '#00ff9d' : '#ff0055';
            
            document.getElementById('rsiDisplay').innerText = rsi.toFixed(1);
            document.getElementById('rsiDisplay').style.color = rsi > 70 ? '#ff0055' : (rsi < 30 ? '#00ff9d' : '#fff');

            document.getElementById('tbl-mm20').innerText = mm20.toFixed(2);
            const sigMM20 = currentPrice > mm20 ? "ACHAT" : "VENTE";
            document.getElementById('sig-mm20').innerText = sigMM20;
            document.getElementById('sig-mm20').style.color = currentPrice > mm20 ? "#00ff9d" : "#ff0055";

            document.getElementById('tbl-bb').innerText = (volatility * 2).toFixed(2);
            document.getElementById('sig-bb').innerText = "NORMAL";
            
            document.getElementById('tbl-vol').innerText = Math.random() > 0.5 ? "HAUT" : "BAS";
            document.getElementById('sig-vol').innerText = "OK";

            // Logique Prédiction Simple
            const signalEl = document.getElementById('mainSignal');
            const reasonEl = document.getElementById('algoReason');
            const probEl = document.getElementById('probDisplay');
            const trendEl = document.getElementById('trendDisplay');

            let direction = "NEUTRE";
            let prob = 50;

            if (rsi > 60 || currentPrice > mm20) {
                direction = "HAUSSIER ";
                prob = 60 + (rsi > 70 ? 10 : 0) + (currentPrice > mm20 ? 10 : 0);
                trendEl.innerText = "HAUSSIER";
                trendEl.style.color = "#00ff9d";
                signalEl.className = "pred-value bull-text";
            } else if (rsi < 40 || currentPrice < mm20) {
                direction = "BAISSIER 📉";
                prob = 60 + (rsi < 30 ? 10 : 0) + (currentPrice < mm20 ? 10 : 0);
                trendEl.innerText = "BAISSIER";
                trendEl.style.color = "#ff0055";
                signalEl.className = "pred-value bear-text";
            } else {
                trendEl.innerText = "NEUTRE";
                trendEl.style.color = "#fff";
                signalEl.className = "pred-value neutral-text";
            }

            if(prob > 90) prob = 90;
            
            signalEl.innerText = direction;
            probEl.innerText = prob + "%";
            probEl.style.color = prob > 70 ? "#00ff9d" : "#fff";
            reasonEl.innerText = `RSI: ${rsi.toFixed(1)} | Prix vs MM20: ${currentPrice > mm20 ? '+' : '-'}`;

            // Update Graphique
            updateChart();
            
            // Log Console
            if(Math.random() > 0.7) {
                const logDiv = document.getElementById('consoleLog');
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerText = `> Tick: ${currentPrice.toFixed(2)} | RSI: ${rsi.toFixed(1)}`;
                logDiv.prepend(entry);
                if(logDiv.children.length > 10) logDiv.lastChild.remove();
            }
        }

        function updateChart() {
            const ctx = document.getElementById('proChart').getContext('2d');
            
            if (!chartInstance) {
                // Création du graphique si n'existe pas encore
                chartInstance = new Chart(ctx, {
                    type: 'line',
                     {
                        labels: Array(MAX_POINTS).fill(''),
                        datasets: [{
                            label: 'Prix',
                             priceHistory,
                            borderColor: '#00f2ff',
                            backgroundColor: 'rgba(0, 242, 255, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: { duration: 0 }, // Pas d'animation pour perf
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { display: false },
                            y: { 
                                display: true, 
                                position: 'right',
                                grid: { color: '#1e293b' },
                                ticks: { color: '#64748b', font: {size: 9} }
                            }
                        }
                    }
                });
            } else {
                // Mise à jour des données
                chartInstance.data.datasets[0].data = priceHistory;
                chartInstance.update();
            }
        }

        // Démarrage
        window.onload = function() {
            console.log("Démarrage du bot...");
            // Premier lancement immédiat
            runAnalysis();
            // Boucle toutes les 1 seconde
            setInterval(runAnalysis, UPDATE_INTERVAL);
        };
    </script>
</body>
</html>
